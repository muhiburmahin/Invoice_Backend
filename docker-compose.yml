services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: invoice
      POSTGRES_PASSWORD: invoice
      POSTGRES_DB: invoice
    ports:
      - "5432:5432"
    volumes:
      - invoice_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U invoice -d invoice"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build: .
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://invoice:invoice@postgres:5432/invoice
      CLIENT_URL: http://localhost:5173
      BETTER_AUTH_SECRET: dev-better-auth-secret-min-32-characters-long!!
      REDIS_URL: redis://redis:6379
      FEATURE_SCHEDULED_JOBS: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  worker:
    build: .
    command: npm run worker
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://invoice:invoice@postgres:5432/invoice
      REDIS_URL: redis://redis:6379
      FEATURE_SCHEDULED_JOBS: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

volumes:
  invoice_pg:
